<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds-from-desktop">
    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
      <span class="govuk-caption-l" data-testid="section-heading">Staff records</span>
      <h1 class="govuk-fieldset__heading">Update pay for multiple staff</h1>
    </legend>
    <app-new-pill-with-link
      [linkText]="'Fast-track pay updates by job roles'"
      [showNewPill]="true"
      data-testid="fast-track-pay-update-link"
      (clicked)="handleClickForFastTrackPageLink()"
    ></app-new-pill-with-link>
  </div>
</div>
<div class="govuk-grid-row">
  <div class="govuk-grid-column-full govuk-!-margin-top-8"></div>
</div>

<div class="govuk-grid-row">
  <div class="govuk-grid-column-full">
    <table class="govuk-table govuk-!-margin-bottom-3">
      <thead class="govuk-table__head">
        <tr class="govuk-table__row">
          <th data-testid="name-or-id-header" scope="col" class="govuk-table__header">Name or ID number</th>
          <th data-testid="job-role-header" scope="col" class="govuk-table__header">Job role</th>
          <th data-testid="pay-header" scope="col" class="govuk-table__header">Hourly pay rate or salary</th>
        </tr>
      </thead>
      <tbody class="govuk-table__body asc__workers-pay-data-table">
        @for (worker of workersToShow; track worker.uid; let workerIndex = $index) {
          <tr class="govuk-table__row">
            <td class="govuk-table__cell">{{ worker.nameOrId }}</td>
            <td class="govuk-table__cell">{{ worker?.mainJob?.title }}</td>
            <td class="govuk-table__cell">
              <div class="govuk-radios govuk-radios--inline govuk-radios--small govuk-!-margin-bottom-0">
                @for (button of radioButtonLabels; track $index) {
                  <div class="govuk-radios__item">
                    <input
                      class="govuk-radios__input"
                      [attr.data-testid]="button.slug + '-radio-' + workerIndex"
                      [id]="button.slug + '-' + workerIndex"
                      [name]="worker.uid + '-radio'"
                      type="radio"
                      [value]="button.value"
                    />
                    <label class="govuk-label govuk-radios__label" [for]="button.slug + '-' + workerIndex">
                      {{ button.label }}
                    </label>
                  </div>
                }
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
