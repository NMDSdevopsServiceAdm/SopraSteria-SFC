<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <span data-testid="caption" class="govuk-caption-l">User accounts</span>
    <h1 data-testid="heading" class="govuk-heading-l">Would you like to take part in our user research sessions?</h1>
  </div>
  <div class="govuk-grid-column-two-thirds">
    <div data-testid="text">
      <p class="govuk-body govuk-!-margin-bottom-0">We’d like your help and it doesn’t matter if you’re new to ASC-WDS.</p>
      <p class="govuk-body">If you want to take part, select Yes so that a user researcher from our digital partner can contact you.</p>
    </div>
  </div>
  <div class="govuk-grid-column-two-thirds">
    <app-details [title]="detailsTitle" >
      <p data-testid="details-text-one" class="govuk-body asc__negative-margin-right-4">
        {{ detailsTextOne }}
      </p>
      <p data-testid="details-text-two" class="govuk-body">
        {{ detailsTextTwo }}
      </p>
    </app-details>
  </div>
</div>
