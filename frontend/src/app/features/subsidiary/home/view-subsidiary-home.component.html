<app-new-dashboard-header [workplace]="subsidiaryWorkplace" [canAddWorker]="canAddWorker" tab="home">
</app-new-dashboard-header>

<div class="govuk-width-container govuk-!-margin-top-7">
  <app-alert></app-alert>
  <app-summary-section
    *ngIf="subsidiaryWorkplace"
    [canViewListOfWorkers]="canViewListOfWorkers"
    [workplace]="subsidiaryWorkplace"
    [workerCount]="workerCount"
    [workersCreatedDate]="workersCreatedDate"
    [trainingCounts]="trainingCounts"
    [workersNotCompleted]="workersNotCompleted"
    [(navigateToTab)]="navigateToTab"
    [canViewEstablishment]="canViewEstablishment"
    [canEditEstablishment]="canEditEstablishment"
    [canEditWorker]="canEditWorker"
    [isParentSubsidiaryView]="true"
    [noOfWorkersWhoRequireInternationalRecruitment]="noOfWorkersWhoRequireInternationalRecruitment"
    [noOfWorkersWithCareWorkforcePathwayCategoryRoleUnanswered]="
      noOfWorkersWithCareWorkforcePathwayCategoryRoleUnanswered
    "
    [noOfWorkersWithDelegatedHealthcareUnanswered]="noOfWorkersWithDelegatedHealthcareUnanswered"
    [showCheckCqcDetails]="showCheckCqcDetails"
  ></app-summary-section>
</div>
<div class="govuk-width-container govuk-!-margin-top-7">
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <div class="govuk-grid-row">
        <div class="govuk-grid-column-one-half govuk-!-padding-right-1">
          <app-card [image]="'/assets/images/benchmarks.svg'" title="Benchmarks">
            <a
              (click)="navigateToTab($event, 'benchmarks')"
              class="govuk-link govuk-link--no-visited-state homepage-card-link"
              href="#"
            >
              <ng-container *ngIf="bigThreeServices && hasBenchmarkComparisonData; else notBigThreeServices">
                Compare your workplace <br />on staff pay and retention</ng-container
              >
              <ng-template #notBigThreeServices> See how you compare against other workplaces</ng-template>
            </a>
            <p class="govuk-!-margin-top-0 homepage-card-description">
              {{ benchmarksMessage }}
            </p>
          </app-card>
        </div>

        <div class="govuk-grid-column-one-half govuk-!-padding-left-1">
          <app-card [image]="'/assets/images/benefits-bundle.svg'" title="Benefits Bundle">
            <a
              class="govuk-link govuk-link--no-visited-state homepage-card-link"
              routerLink="/benefits-bundle"
              href="#"
            >
              View the ASC-WDS<br />
              Benefits Bundle</a
            >
            <p class="govuk-!-margin-top-0 homepage-card-description">
              Access discounts and special offers for staff training.
            </p></app-card
          >
        </div>
      </div>
    </div>
    <div class="govuk-grid-column-one-third">
      <app-new-article-list data-testid="article-list"></app-new-article-list>
      <app-other-links
        [canBulkUpload]="canBulkUpload"
        [canViewReports]="canViewReports"
        [isParentSubsidiaryView]="true"
      ></app-other-links>
    </div>
  </div>
</div>
