@if(linkText){
<div class="govuk-!-margin-top-5 govuk-!-margin-bottom-5" data-testid="new-pill-with-link">
  <span class="govuk-!-font-size-19 new-pill-with-link">
    @if(showNewPill){
    <img src="/assets/images/big-red-pill.svg" data-testid="new-pill" alt="" class="new-pill-with-link__icon" />
    }
    <a role="button" href="#" data-testid="link" class="new-pill-with-link__link" (click)="onLinkClick($event)">
      {{ linkText }}</a
    >
  </span>
</div>
}
